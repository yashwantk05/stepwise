name: Build and deploy Node app to Azure Web App - stepwise

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - run: npm ci
      - run: npm run build
      - run: npm prune --omit=dev

      - uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: |
            dist
            node_modules
            server
            package.json
            package-lock.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-package
          path: .

      - uses: azure/webapps-deploy@v3
        with:
          app-name: stepwise
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
